<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sheets Viewer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="9" height="9" rx="2.5" fill="#22c55e"/>
          <rect x="13" y="2" width="9" height="9" rx="2.5" fill="#3b82f6"/>
          <rect x="2" y="13" width="9" height="9" rx="2.5" fill="#3b82f6"/>
          <rect x="13" y="13" width="9" height="9" rx="2.5" fill="#22c55e"/>
        </svg>
        <span>Sheets Viewer</span>
      </div>
      <button class="btn-icon" onclick="openAddModal()" title="Adicionar planilha">+</button>
    </div>
    <div class="search-wrap">
      <input id="sidebarSearch" class="input-search" placeholder="Buscar planilha..." oninput="filterSidebar(this.value)"/>
    </div>
    <nav id="sheetNav" class="sheet-nav">
      <p class="nav-empty muted">Nenhuma planilha cadastrada.</p>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-settings" onclick="openSettings()">⚙ Configurações</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="main" id="main">
    <header class="topbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div class="topbar-info">
    <h1 id="topTitle">Selecione uma planilha</h1>
    <span id="topSub" class="muted"></span>
  </div>
  <span id="apiStatus" class="badge badge-muted">Verificando...</span>
  <button class="btn-icon" onclick="openSettings()" title="Configurações">⚙</button>
</header>

    <div class="tabs-bar" id="tabsBar" style="display:none">
      <div id="tabsList" class="tabs-list"></div>
    </div>

    <div class="toolbar" id="toolbar" style="display:none">
  <input id="tableSearch" class="input-search" placeholder="Buscar nos dados..." oninput="debounceSearch(this.value)" style="max-width:280px"/>
  <button id="editModeBtn" class="btn btn-secondary" onclick="toggleEditMode()">✏ Edição: OFF</button>
  <button class="btn btn-secondary" onclick="exportCSV()">⬇ CSV</button>
  <button class="btn btn-secondary" onclick="exportPDF()">🖨 PDF</button>
  <span id="rowCount" class="muted"></span>
  <div class="pagination" id="paginationTop"></div>
</div>

    <div class="content" id="content">
      <div class="welcome">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="9" height="9" rx="2.5" fill="#22c55e" opacity=".7"/>
          <rect x="13" y="2" width="9" height="9" rx="2.5" fill="#3b82f6" opacity=".7"/>
          <rect x="2" y="13" width="9" height="9" rx="2.5" fill="#3b82f6" opacity=".7"/>
          <rect x="13" y="13" width="9" height="9" rx="2.5" fill="#22c55e" opacity=".7"/>
        </svg>
        <h2>Bem-vindo ao Sheets Viewer</h2>
        <p class="muted">Adicione planilhas no menu lateral e acesse todos os dados em um só lugar.</p>
        <button class="btn btn-primary" onclick="openAddModal()">+ Adicionar primeira planilha</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Adicionar -->
  <div class="modal-overlay" id="addModal" onclick="closeModal('addModal')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Adicionar planilha</h2>
        <button class="btn-icon" onclick="closeModal('addModal')">✕</button>
      </div>
      <p class="muted">Cole o ID da planilha. Você encontra na URL entre <code>/d/</code> e <code>/edit</code>.</p>
      <div class="form-group">
        <label>ID da planilha</label>
        <input id="addId" class="input" placeholder="1ABC...xyz"/>
      </div>
      <div class="form-group">
        <label>Nome (opcional)</label>
        <input id="addName" class="input" placeholder="Deixe em branco para usar o nome original"/>
      </div>
      <p id="addError" class="error-msg" style="display:none"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancelar</button>
        <button class="btn btn-primary" id="addConfirmBtn" onclick="confirmAdd()">Adicionar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Configurações -->
  <div class="modal-overlay" id="settingsModal" onclick="closeModal('settingsModal')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Configurações</h2>
        <button class="btn-icon" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="form-group">
        <label>URL do Web App (Apps Script)</label>
        <input id="cfgUrl" class="input" placeholder="https://script.google.com/macros/s/.../exec"/>
      </div>
      <div class="form-group">
        <label>Token de autenticação</label>
        <input id="cfgToken" class="input" type="password" placeholder="Seu token secreto"/>
      </div>
      <p id="cfgStatus" class="muted" style="margin-top:8px"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveSettings()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
